<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA — Copiloto Concursal · insolvencia.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0D0D12;
      --ivory: #F8F6F1;
      --gold: #B8962E;
      --gold-light: #D4AF5A;
      --text: #3D4A5C;
      --muted: #8A95A3;
      --border: rgba(13,13,18,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--ivory);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
      height: 64px;
      background: rgba(248,246,241,0.97);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(14px);
      flex-shrink: 0;
    }

    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    .nav-brand span { color: var(--gold); }

    .nav-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #10B981;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .nav-back {
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      transition: color 0.2s;
    }

    .nav-back:hover { color: var(--ink); }

    /* MESSAGES */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 5%;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      gap: 0.75rem;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .avatar.aria { background: var(--ink); color: var(--gold-light); }
    .avatar.user-av { background: #E5E7EB; color: var(--muted); }

    .bubble {
      max-width: 76%;
      padding: 0.85rem 1.1rem;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.75;
    }

    .bubble.aria {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      color: var(--text);
      white-space: pre-wrap;
    }

    .bubble.user {
      background: var(--ink);
      color: var(--ivory);
      border-radius: 16px 4px 16px 16px;
    }

    /* SUGGESTIONS */
    #suggestions {
      padding: 0 5% 1rem;
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
    }

    #suggestions p {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .suggestions-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .suggestion-btn {
      font-size: 0.78rem;
      padding: 0.4rem 0.85rem;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .suggestion-btn:hover {
      border-color: var(--gold);
      color: var(--ink);
    }

    /* TYPING */
    .typing-bubble {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      padding: 0.85rem 1.1rem;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* INPUT */
    #input-area {
      padding: 1rem 5%;
      border-top: 1px solid var(--border);
      background: rgba(248,246,241,0.97);
      backdrop-filter: blur(14px);
      flex-shrink: 0;
    }

    .input-inner {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }

    #input-wrap {
      flex: 1;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    #input-wrap:focus-within { border-color: var(--gold); }

    #chat-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      padding: 0.85rem 1rem;
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      resize: none;
      max-height: 120px;
      line-height: 1.6;
    }

    #send-btn {
      width: 44px;
      height: 44px;
      background: var(--ink);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    #send-btn:disabled { background: #E5E7EB; cursor: not-allowed; }
    #send-btn:not(:disabled):hover { background: #1a1a24; }

    #send-btn svg { transition: stroke 0.2s; }

    .disclaimer {
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Volver
    </a>
    <a href="/" class="nav-brand">insolvencia<span>.ai</span></a>
    <div class="nav-status">
      <div class="status-dot"></div>
      ARIA en línea
    </div>
  </nav>

  <div id="messages"></div>

  <div id="suggestions">
    <p>Consultas frecuentes:</p>
    <div class="suggestions-list">
      <button class="suggestion-btn" onclick="sendSuggestion(this)">¿Cómo se clasifica un crédito hipotecario en el concurso?</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">¿Cuáles son los plazos para solicitar la exoneración EPI?</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">¿Qué requisitos exige el TRLC para el concurso consecutivo?</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">¿Cuándo procede la calificación culpable del concurso?</button>
    </div>
  </div>

  <div id="input-area">
    <div class="input-inner">
      <div id="input-wrap">
        <textarea id="chat-input" rows="1" placeholder="Escribe tu consulta concursal... (Enter para enviar)"></textarea>
      </div>
      <button id="send-btn" disabled onclick="sendMessage()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#D4AF5A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="disclaimer">ARIA es un copiloto jurídico. No sustituye el criterio profesional del abogado.</p>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const suggestionsEl = document.getElementById('suggestions');

    let history = [];
    let isLoading = false;

    const WELCOME = `Hola, soy **ARIA**, tu copiloto de derecho concursal.

Estoy especializada en el **Texto Refundido de la Ley Concursal (TRLC)** y la jurisprudencia de los Juzgados de lo Mercantil y el Tribunal Supremo.

Puedo ayudarte con clasificación de créditos, segunda oportunidad, EPI, acciones de reintegración, calificación del concurso y reestructuración de deuda.

¿Sobre qué expediente o cuestión concursal trabajamos hoy?`;

    function addMessage(role, content) {
      const msg = document.createElement('div');
      msg.className = `msg ${role}`;

      const avatar = document.createElement('div');
      avatar.className = `avatar ${role === 'assistant' ? 'aria' : 'user-av'}`;
      avatar.textContent = role === 'assistant' ? 'AR' : 'TÚ';

      const bubble = document.createElement('div');
      bubble.className = `bubble ${role === 'assistant' ? 'aria' : 'user'}`;
      bubble.textContent = content.replace(/\*\*(.*?)\*\*/g, '$1');

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return msg;
    }

    function addTyping() {
      const msg = document.createElement('div');
      msg.className = 'msg';
      msg.id = 'typing';

      const avatar = document.createElement('div');
      avatar.className = 'avatar aria';
      avatar.textContent = 'AR';

      const bubble = document.createElement('div');
      bubble.className = 'typing-bubble';
      bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function sendMessage(text) {
      const content = text || inputEl.value.trim();
      if (!content || isLoading) return;

      suggestionsEl.style.display = 'none';
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;
      isLoading = true;

      history.push({ role: 'user', content });
      addMessage('user', content);
      addTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });

        const data = await res.json();
        removeTyping();

        if (!res.ok) throw new Error(data.error || 'Error');

        history.push({ role: 'assistant', content: data.message });
        addMessage('assistant', data.message);

      } catch (err) {
        removeTyping();
        addMessage('assistant', 'Error al conectar con el servidor. Inténtalo de nuevo.');
      } finally {
        isLoading = false;
        inputEl.focus();
      }
    }

    function sendSuggestion(btn) {
      sendMessage(btn.textContent);
    }

    inputEl.addEventListener('input', () => {
      sendBtn.disabled = !inputEl.value.trim();
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Welcome message
    addMessage('assistant', WELCOME);
  </script>

</body>
</html>
